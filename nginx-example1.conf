worker_processes auto;

events {
    worker_connections 8192;   # 提升并发连接数
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 新增：WebSocket 反代所需
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ============================
    # hs-admin UI 反代（5100 → 5000）
    # ============================
    server {
        listen 5100 ssl;
        server_name he.zht.cc.cd;
    
        ssl_certificate     /usr/local/openresty/nginx/html/cert/cert.pem;
        ssl_certificate_key /usr/local/openresty/nginx/html/cert/key.pem;

        location = /admin {
            return 302 /admin/;
        }

        location /admin/ {
            proxy_pass http://192.168.1.11:5000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://192.168.1.11:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://192.168.1.11:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # ============================
    # Headscale API 反代（8181 → 8180）
    # ============================
    server {
        listen 8181 ssl;
        server_name he.zht.cc.cd;
    
        ssl_certificate     /usr/local/openresty/nginx/html/cert/cert.pem;
        ssl_certificate_key /usr/local/openresty/nginx/html/cert/key.pem;

        location /derp {
            proxy_pass http://192.168.1.11:8180;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_buffering off;
        }

        location ~ ^/(health|oidc|windows|apple|key|bootstrap-dns|swagger|ts2021|machine) {
            proxy_pass http://192.168.1.11:8180;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        }
    }

}
